name: ✨ Feature Request
description: Suggest an idea or enhancement for Nexc
labels: [ "enhancement", "needs-triage" ]
body:
    -   type: markdown
        attributes:
            value: |
                Thanks for your interest in improving Nexc!
                Please verify that your idea fits the project scope before submitting.

    -   type: checkboxes
        id: checklist
        attributes:
            label: Prerequisites
            options:
                -   label: I have searched the [Existing Discussions](https://github.com/NexcOrg/Nexc/discussions) and this is not a duplicate.
                    required: true
                -   label: I have searched the [Existing Issues](https://github.com/NexcOrg/Nexc/issues) and this is not a duplicate.
                    required: true
                -   label: I have read the [Contributing Guidelines](https://github.com/NexcOrg/Nexc/blob/main/CONTRIBUTING.md).
                    required: true

    -   type: textarea
        id: problem
        attributes:
            label: Is your feature request related to a problem?
            description: A clear and concise description of what the problem is.
            placeholder: "Ex: I'm always frustrated when I have to tap three times just to..."
        validations:
            required: true

    -   type: textarea
        id: solution
        attributes:
            label: Describe the solution you would like
            description: A clear and concise description of what you want to happen.
            placeholder: "Ex: Add a 'Quick Save' button to the main toolbar..."
        validations:
            required: true

    -   type: textarea
        id: alternatives
        attributes:
            label: Describe alternatives you've considered
            description: Have you considered other ways to solve this?
            placeholder: "Ex: I thought about using a gesture, but a button seems more discoverable..."
        validations:
            required: false

    -   type: textarea
        id: additional-context
        attributes:
            label: Mockups / Screenshots
            description: |
                For UI changes, a mockup or drawing is incredibly helpful. 
                *You can drag and drop images directly into this box.*
            placeholder: "[Upload mockups here]"
        validations:
            required: false